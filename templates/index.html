<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Attendance</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(to right, #74ebd5, #9face6);
            min-height: 100vh;
        }
        .card {
            border-radius: 15px;
        }
        h1 {
            font-weight: bold;
        }
    </style>
</head>

<body>

<div class="container mt-5">

    <!-- FORM CARD -->
    <div class="card shadow p-4 mb-5">
        <h3 class="text-center mb-4">📋 Add Attendance</h3>

        <form action="/add" method="POST">
            
            <div class="mb-3">
                <label class="form-label">Student Name</label>
                <input type="text" class="form-control" name="student_name" placeholder="Enter student name" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Roll Number</label>
                <input type="text" class="form-control" name="student_roll" placeholder="Enter roll number" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Status</label>
                <select class="form-select" name="status">
                    <option value="Present">✅ Present</option>
                    <option value="Absent">❌ Absent</option>
                    <option value="Absent">Leave</option>
                </select>
            </div>

            <button type="submit" class="btn btn-primary w-100">Submit</button>

        </form>
    </div>

    <!-- TABLE -->
    <div class="card shadow p-4">
        <h3 class="text-center mb-4">📊 Attendance Records</h3>

        <table class="table table-striped table-hover text-center align-middle">
            <thead class="table-dark">
                <tr>
                    <th>Student Name</th>
                    <th>Roll Number</th>
                    <th>Date</th>
                    <th>Status</th>
                    <th>Action</th>
                </tr>
            </thead>

            <tbody>
                {% for record in records %}
                <tr>
                    <td>{{record.student_name}}</td>
                    <td>{{record.roll_no}}</td>
                    <td>{{record.date}}</td>
                    <td>
                        {% if record.status == "Present" %}
                            <span class="badge bg-success">Present</span>
                        {% else %}
                            <span class="badge bg-danger">Absent</span>
                        {% endif %}
                    </td>
                    <td>
                        <a href="/delete/{{record.id}}" class="btn btn-danger btn-sm">Delete</a>
                    </td>
                </tr>
                {% endfor %}
            </tbody>

        </table>
    </div>

</div>

</body>
</html>
